<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓貓麵包店 - 朋友連線版</title>
    <style>
        body { font-family: sans-serif; background: #fcfaf2; margin: 0; padding: 20px; text-align: center; color: #4a3e3d; }
        h1 { color: #d96b43; margin: 5px; }
        input, button { padding: 8px; font-size: 14px; border-radius: 8px; border: 2px solid #bda88a; font-weight: bold; margin: 2px; }
        button { background: #f4a261; color: white; border: none; cursor: pointer; box-shadow: 0 4px 0 #e76f51; }
        button:active { transform: translateY(4px); box-shadow: none; }
        .game-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 15px; }
        .board { display: grid; grid-template-columns: repeat(5, 90px); grid-template-rows: repeat(5, 90px); gap: 6px; background: #eedec4; padding: 10px; border-radius: 12px; border: 4px solid #bda88a; }
        .tile { background: #fff; border: 2px solid #dcd1be; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; position: relative; font-weight: bold; }
        .center-tile { background: #ffe57f; border-color: #ffb300; }
        .side-panel { display: flex; flex-direction: column; gap: 12px; min-width: 260px; text-align: left; }
        .box { background: #fff; padding: 12px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid #e9c46a; }
        .notebook-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 5px; }
        .note-item { cursor: pointer; padding: 4px; border-bottom: 1px dashed #eedec4; font-size: 13px; }
        .status-bar { max-width: 760px; background: #264653; color: white; padding: 10px; border-radius: 8px; margin: 10px auto; font-weight: bold; }
        .log-box { max-width: 760px; background: #ece7dd; height: 80px; margin: 10px auto; overflow-y: auto; padding: 8px; border-radius: 8px; text-align: left; font-size: 12px; border: 1px solid #d1c7b7; }
        .p-avatar { padding: 2px 5px; border-radius: 5px; font-size: 10px; color: white; margin-top: 2px; font-weight: bold; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <h1>🐾 貓貓麵包店的完美配方 🐾</h1>
    
    <div id="lobby" class="box" style="display:inline-block; border-color:#f4d35e;">
        <input type="text" id="playerName" placeholder="我的暱稱" style="width:90px;">
        <input type="text" id="roomId" placeholder="房號" value="888" style="width:40px; text-align:center;">
        <button onclick="joinRoom()">1. 進入廚房連線</button>
        <button id="startBtn" onclick="startGame()" style="background:#2a9d8f; box-shadow:0 4px 0 #1f7469; display:none;">2. 全員到齊！開賽發牌</button>
    </div>

    <div class="status-bar" id="statusBar">🧁 歡迎！請先輸入暱稱並進入連線。</div>
    <div class="log-box" id="logBox">🪵 貓咪腳印日誌將顯示於此...</div>

    <div class="game-container" id="gameScreen" style="display:none;">
        <div class="board" id="kitchenBoard"></div>
        
        <div class="side-panel">
            <div class="box" style="border-left:6px solid #ff85a2;">
                <h3 style="margin:0;">📒 偵探筆記 (點擊劃掉)</h3>
                <div class="notebook-grid" id="notebookGrid"></div>
            </div>
            
            <div class="box">
                <div id="handPanel" style="color:#d96b43; font-weight:bold; margin-bottom:8px;">🎴 我的提示卡：等待發牌...</div>
                <div id="inventoryPanel" style="font-weight:bold; color:#264653;">🎒 食材背包：空</div>
            </div>

            <div class="box" style="background:#fffde7; text-align:center;">
                <h4 style="margin:0 0 5px 0;">🔥 站在烤爐上輸入推測配方</h4>
                <input type="number" id="guessInput" placeholder="數字(1-10)" style="width:80px; text-align:center;">
                <button onclick="submitBake()" style="background:#e76f51; box-shadow:0 4px 0 #b54f35;">開爐判定！</button>
            </div>
            
            <!-- 核心功能：免洗畫面直接重開鈕 -->
            <button id="restartBtn" onclick="startGame()" style="background:#2a9d8f; box-shadow:0 4px 0 #1f7469; display:none; width:100%;">🔄 再玩一局 (直接重洗發牌)</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myName = "", currentRoomId = "", isMyTurn = false, myCurrentPos = 0;

        // 生成隨機預設暱稱
        document.getElementById('playerName').value = '玩家貓' + Math.floor(Math.random()*900 + 100);

        function joinRoom() {
            currentRoomId = document.getElementById('roomId').value;
            myName = document.getElementById('playerName').value;
            if(!myName) return alert("請輸入暱稱！");
            
            socket.emit('joinRoom', { roomId: currentRoomId, playerName: myName });
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('statusBar').innerText = `已進入房間 #${currentRoomId}！等待大家到齊後點擊開賽...`;
            initNotebookUI();
        }

        function startGame() { 
            socket.emit('startGame', currentRoomId); 
            document.getElementById('restartBtn').style.display = 'none';
        }

        function initNotebookUI() {
            const notebook = document.getElementById('notebookGrid');
            notebook.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const item = document.createElement('div');
                item.className = 'note-item';
                item.innerText = `配方 ${i.toString().padStart(2, '0')} ⭕`;
                item.onclick = () => {
                    item.innerText = item.innerText.includes('⭕') ? `配方 ${i.toString().padStart(2, '0')} ❌` : `配方 ${i.toString().padStart(2, '0')} ⭕`;
                    item.style.color = item.innerText.includes('❌') ? '#ccc' : '#4a3e3d';
                };
                notebook.appendChild(item);
            }
        }

        socket.on('gameStateUpdate', (room) => {
            const board = document.getElementById('kitchenBoard');
            board.innerHTML = '';

            room.boardTiles.forEach((tileType, i) => {
                const tile = document.createElement('div');
                tile.className = i === 12 ? 'tile center-tile' : 'tile';
                tile.innerHTML = tileType === '🍳 中央烤爐' ? '🍳<br>烤爐' : tileType === '🍓 食材櫃' ? '🍓<br>食材櫃' : tileType === '🔍 辦公室' ? '🔍<br>辦公室' : '🧱<br>流理台';

                room.players.forEach(p => {
                    if (p.pos === i) {
                        const tag = document.createElement('span');
                        tag.className = 'p-avatar';
                        let isMe = (p.id === socket.id || p.name === myName);
                        if (isMe) { myCurrentPos = i; } // 紀錄自己位置
                        tag.style.background = isMe ? '#e76f51' : '#2a9d8f';
                        tag.innerText = isMe ? '🐾 我' : p.name.replace(' (AI)', '');
                        tile.appendChild(tag);
                    }
                });
                
                tile.onclick = () => {
                    if (!isMyTurn) return alert("現在不是你的回合喔！");
                    socket.emit('movePlayer', { roomId: currentRoomId, targetPos: i });
                };
                board.appendChild(tile);
            });

            let currentP = room.players[room.turnIndex];
            isMyTurn = (currentP.id === socket.id || currentP.name === myName);
            document.getElementById('statusBar').innerText = isMyTurn ? "🌟 輪到你的回合！請點擊前後左右或斜角相鄰的 1 格移動！" : `💤 等待中... 當前輪到：【${currentP.name}】`;
            document.getElementById('statusBar').style.background = isMyTurn ? "#e76f51" : "#264653";

            let me = room.players.find(p => p.name === myName || p.id === socket.id);
            if (me) {
                document.getElementById('handPanel').innerText = `🎴 我的手牌提示：【配方 ${me.cards.join(' 號】、【配方 ')} 號】`;
                document.getElementById('inventoryPanel').innerText = `🎒 食材背包：${me.inventory.length > 0 ? me.inventory.join(', ') : '空'}`;
            }
        });

        function submitBake() {
            if (myCurrentPos !== 12) return alert("❌ 你必須先走到地圖正中央的「🍳 烤爐」格子才能進行出爐判定！");
            let guess = document.getElementById('guessInput').value;
            if(!guess) return alert("請輸入數字！");
            socket.emit('tryBake', { roomId: currentRoomId, guessNumber: guess.padStart(2, '0') });
        }

        socket.on('gameLog', (msg) => {
            const box = document.getElementById('logBox');
            box.innerHTML += `<div>${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        socket.on('intelFound', (data) => alert(data.msg));
        socket.on('moveResult', (data) => alert(data.msg));
        socket.on('bakeResult', (data) => alert(data.msg));
        
        socket.on('gameOver', (data) => { 
            alert(data.msg); 
            document.getElementById('statusBar').innerText = `🏆 遊戲結束！勝者：${data.winner}！可以點擊下方按鈕重開一局。`;
            document.getElementById('restartBtn').style.display = 'block'; // 顯示重開按鈕
        });
    </script>
</body>
</html>
