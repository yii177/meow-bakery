<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓貓麵包店的完美配方 - 連線動態版</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f7f5f0; margin: 0; padding: 20px; text-align: center; }
        .setup-panel { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .game-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .board { display: grid; grid-template-columns: repeat(5, 90px); grid-template-rows: repeat(5, 90px); gap: 6px; background: #e0d8c8; padding: 12px; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .tile { background-color: #fff; border: 2px solid #bda88a; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; transition: all 0.2s; position: relative; font-weight: bold; }
        .tile:hover { transform: scale(1.05); background-color: #fffdf9; }
        .center-tile { background-color: #ffd166; border-color: #f4a261; }
        .notebook { background: #fff; border-left: 5px solid #ff85a2; padding: 15px; border-radius: 5px; box-shadow: 2px 2px 10px rgba(0,0,0,0.05); text-align: left; min-width: 250px; }
        .notebook-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .note-item { cursor: pointer; padding: 5px; border-bottom: 1px dashed #ccc; }
        .status-bar { width: 100%; max-width: 750px; background: #264653; color: white; padding: 10px; border-radius: 8px; margin: 10px auto; font-weight: bold; display: none; }
        .player-tag { position: absolute; bottom: 4px; background: #e76f51; color: white; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .hand-panel { background: #e9c46a; padding: 10px; border-radius: 5px; margin-top: 15px; font-weight: bold; text-align: left; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <h1>🐾 貓貓麵包店的完美配方 🐾</h1>
    
    <div class="setup-panel" id="lobby">
        <input type="text" id="playerName" placeholder="貓咪暱稱" value="橘貓新手" style="padding: 5px;">
        <input type="text" id="roomId" placeholder="房間號碼" value="123" style="padding: 5px; width: 60px;">
        <button onclick="joinRoom()" style="padding: 5px 10px; background: #2a9d8f; color: white; border: none; cursor: pointer;">加入/創建房間</button>
        <button onclick="startGame()" style="padding: 5px 10px; background: #e76f51; color: white; border: none; cursor: pointer;">補滿AI並開賽！</button>
    </div>

    <div class="status-bar" id="statusBar">🎮 遊戲進行中 | 當前輪到：等待開賽...</div>

    <div class="game-container" id="gameScreen" style="display:none;">
        <div class="board" id="kitchenBoard"></div>
        
        <div>
            <div class="notebook">
                <h3>📒 肉墊偵探筆記 (點擊排除)</h3>
                <div class="notebook-grid" id="notebookGrid"></div>
            </div>
            <div class="hand-panel" id="handPanel">🎴 我的神祕提示卡：等待發牌...</div>
        </div>
    </div>

    <script>
        const socket = io();
        let myId = null;
        let gameState = { players: [], board: Array(25).fill('🧱 流理台') };

        function joinRoom() {
            const roomId = document.getElementById('roomId').value;
            const playerName = document.getElementById('playerName').value;
            socket.emit('joinRoom', { roomId, playerName });
            myId = socket.id;
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('statusBar').style.display = 'block';
            initBoardUI();
            initNotebookUI();
        }

        function startGame() {
            const roomId = document.getElementById('roomId').value;
            socket.emit('startGame', roomId);
        }

        // 靜態生成 5x5 地圖基礎外觀
        function initBoardUI() {
            const board = document.getElementById('kitchenBoard');
            board.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.id = `tile-${i}`;
                if (i === 12) {
                    tile.classList.add('center-tile');
                    tile.innerHTML = '🍳<br>中央烤爐';
                } else if (i % 4 === 0) {
                    tile.innerHTML = '🍓<br>食材櫃';
                } else if (i === 6 || i === 18) {
                    tile.innerHTML = '🔍<br>辦公室';
                } else {
                    tile.innerHTML = '🧱<br>流理台';
                }
                // 點擊流理台格子時觸發移動
                tile.onclick = () => handleTileClick(i);
                board.appendChild(tile);
            }
        }

        function initNotebookUI() {
            const notebook = document.getElementById('notebookGrid');
            notebook.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const item = document.createElement('div');
                item.classList.add('note-item');
                item.innerText = `配方 ${i.toString().padStart(2, '0')} ⭕`;
                item.onclick = () => {
                    item.innerText = item.innerText.includes('⭕') ? `配方 ${i.toString().padStart(2, '0')} ❌` : `配方 ${i.toString().padStart(2, '0')} ⭕`;
                };
                notebook.appendChild(item);
            }
        }

        // 【核心修正】動態更新玩家位置與手牌資訊
        socket.on('gameStarted', (data) => {
            document.getElementById('statusBar').innerText = `🎮 遊戲正式開始！當前回合：${data.players[0].name}`;
            
            // 尋找自己在伺服器端分配到的手牌
            const me = data.players.find(p => p.id === socket.id || p.name === document.getElementById('playerName').value);
            if (me && me.cards) {
                document.getElementById('handPanel').innerText = `🎴 我的神祕提示卡（絕對不是謎底）：【配方 ${me.cards.join(' 號】、【配方 ')} 號】`;
            }

            // 清除舊的貓咪位置，並將 4 隻貓咪放上地圖
            for (let i = 0; i < 25; i++) {
                const tags = document.getElementById(`tile-${i}`).querySelectorAll('.player-tag');
                tags.forEach(t => t.remove());
            }

            // 初始分配位置：4 名玩家依序放入地圖的四個角落與邊緣
            const spawnPoints = [0, 4, 20, 24];
            data.players.forEach((player, index) => {
                const tileIndex = spawnPoints[index];
                const tile = document.getElementById(`tile-${tileIndex}`);
                const tag = document.createElement('div');
                tag.classList.add('player-tag');
                tag.innerText = player.isAI ? '🐱 AI' : '🐾 我';
                if(player.isAI) tag.style.background = '#2a9d8f';
                tile.appendChild(tag);
            });
        });

        function handleTileClick(index) {
            alert(`你點擊了第 ${index + 1} 格廚房板塊！現在輪到你移動，已向伺服器發送走位請求。`);
        }
    </script>
</body>
</html>
